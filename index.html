<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1c35" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Van Escolar Pro" />
  <link rel="apple-touch-icon" href="/logo_vep.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <title>Van Escolar Pro</title>
  <script>
    // 🔗 VAN ESCOLAR PRO: Auto-Hash Redirect
    // Se o usuário acessar uma URL limpa (Vercel), redireciona para a versão com HASH
    // para que o HashRouter consiga ler a rota corretamente.
    (function () {
      var path = window.location.pathname;
      if (path !== '/' && path !== '/index.html') {
        window.location.replace('/#' + path + window.location.search);
      }
    })();
  </script>
  <!-- Scripts do Google para Auth e API -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            navy: {
              900: '#111225',
              800: '#1a1c35',
              700: '#252848',
            },
            primary: {
              500: '#3b82f6',
              600: '#2563eb',
            },
            accent: {
              500: '#8b5cf6',
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #111225;
      color: #e2e8f0;
      -webkit-tap-highlight-color: transparent;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #111225;
    }

    ::-webkit-scrollbar-thumb {
      background: #252848;
      border-radius: 3px;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
